<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora desde MTP y Media de Bitcoin (Multi-Proxy)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .time-display {
            font-size: 1.8em;
            margin: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #f0b90b;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        #status {
            font-size: 1.1em;
            color: #ccc;
            margin: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error {
            color: #ff6b6b !important;
            background: rgba(255, 0, 0, 0.1);
        }
        .success {
            color: #4caf50 !important;
            background: rgba(76, 175, 80, 0.1);
        }
        .warning {
            color: #ffc107 !important;
            background: rgba(255, 193, 7, 0.1);
        }
        button {
            margin: 10px;
            padding: 12px 24px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #f0b90b 0%, #ffc107 100%);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            color: #1e3c72;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .proxy-status {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 0.9em;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .method-selector {
            margin: 20px 0;
        }
        select {
            padding: 8px 15px;
            font-size: 1em;
            border-radius: 5px;
            border: none;
            background: white;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛓️ Hora según Blockchain de Bitcoin</h1>
        
        <div class="method-selector">
            <label for="method">Método de obtención: </label>
            <select id="method">
                <option value="auto">Automático (prueba varios)</option>
                <option value="proxy1">Proxy AllOrigins</option>
                <option value="proxy2">Proxy CORS-Anywhere</option>
                <option value="proxy3">Proxy JSONProxy</option>
                <option value="mempool">Mempool.space API</option>
                <option value="blockstream">Blockstream API</option>
            </select>
        </div>

        <div class="time-display" id="mtp-time">MTP + 3300s: Esperando...</div>
        <div class="time-display" id="system-time">Tiempo del sistema: Esperando...</div>
        <div class="time-display" id="mean-time">Media + 3300s: Esperando...</div>
        
        <div id="status">Listo para obtener datos</div>
        
        <button id="updateBtn" onclick="getBlockchainTimes()">🔄 Actualizar</button>
        <button onclick="toggleAutoUpdate()">⏱️ Auto-actualización: <span id="autoStatus">OFF</span></button>
        
        <div class="proxy-status" id="proxyStatus"></div>
    </div>

    <script>
        let autoUpdateInterval = null;
        let isUpdating = false;

        // Diferentes métodos de obtención de datos
        const dataFetchers = {
            // Método 1: Proxy AllOrigins
            proxy1: async () => {
                const fetchWithProxy = async (url) => {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                };
                
                const latest = await fetchWithProxy('https://blockchain.info/latestblock?cors=true');
                const blocks = [];
                for (let i = latest.height; i >= latest.height - 10; i--) {
                    const blockData = await fetchWithProxy(`https://blockchain.info/block-height/${i}?format=json&cors=true`);
                    blocks.push(blockData.blocks[0]);
                }
                return { blocks, method: 'AllOrigins Proxy' };
            },

            // Método 2: CORS-Anywhere (necesita configuración)
            proxy2: async () => {
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
                const fetchWithProxy = async (url) => {
                    const response = await fetch(proxyUrl + url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                };
                
                const latest = await fetchWithProxy('https://blockchain.info/latestblock');
                const blocks = [];
                for (let i = latest.height; i >= latest.height - 10; i--) {
                    const blockData = await fetchWithProxy(`https://blockchain.info/block-height/${i}?format=json`);
                    blocks.push(blockData.blocks[0]);
                }
                return { blocks, method: 'CORS-Anywhere Proxy' };
            },

            // Método 3: JSONProxy
            proxy3: async () => {
                const fetchWithProxy = async (url) => {
                    const proxyUrl = `https://jsonproxy.com/?url=${encodeURIComponent(url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                };
                
                const latest = await fetchWithProxy('https://blockchain.info/latestblock');
                const blocks = [];
                for (let i = latest.height; i >= latest.height - 10; i--) {
                    const blockData = await fetchWithProxy(`https://blockchain.info/block-height/${i}?format=json`);
                    blocks.push(blockData.blocks[0]);
                }
                return { blocks, method: 'JSONProxy' };
            },

            // Método 4: Mempool.space API (generalmente sin CORS)
            mempool: async () => {
                const response = await fetch('https://mempool.space/api/blocks/tip/height');
                const latestHeight = await response.json();
                
                const blocksResponse = await fetch('https://mempool.space/api/v1/blocks');
                const blocksData = await blocksResponse.json();
                
                // Convertir formato de timestamp si es necesario
                const blocks = blocksData.slice(0, 11).map(block => ({
                    time: block.timestamp || Math.floor(block.mediantime || Date.now()/1000),
                    height: block.height
                }));
                
                return { blocks, method: 'Mempool.space API' };
            },

            // Método 5: Blockstream API
            blockstream: async () => {
                const tipResponse = await fetch('https://blockstream.info/api/blocks/tip/height');
                const latestHeight = await tipResponse.text();
                
                const blocks = [];
                for (let i = 0; i < 11; i++) {
                    const blockResponse = await fetch(`https://blockstream.info/api/block-height/${latestHeight - i}`);
                    const blockHash = await blockResponse.text();
                    const blockData = await fetch(`https://blockstream.info/api/block/${blockHash}`);
                    const block = await blockData.json();
                    blocks.push({ time: block.timestamp, height: block.height });
                }
                
                return { blocks, method: 'Blockstream API' };
            }
        };

        async function getBlockchainTimes() {
            if (isUpdating) return;
            isUpdating = true;
            
            const mtpDiv = document.getElementById('mtp-time');
            const systemDiv = document.getElementById('system-time');
            const meanDiv = document.getElementById('mean-time');
            const statusDiv = document.getElementById('status');
            const proxyStatus = document.getElementById('proxyStatus');
            const updateBtn = document.getElementById('updateBtn');
            const methodSelect = document.getElementById('method');
            
            updateBtn.disabled = true;
            statusDiv.innerHTML = '<span class="loading"></span> Obteniendo datos...';
            statusDiv.className = '';
            
            try {
                // Actualizar tiempo del sistema
                const systemDate = new Date();
                systemDiv.textContent = `Sistema (GMT-3): ${systemDate.toLocaleString('es-AR', {
                    timeZone: 'America/Argentina/Buenos_Aires',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                })}`;

                let result = null;
                let errors = [];
                
                const selectedMethod = methodSelect.value;
                
                if (selectedMethod === 'auto') {
                    // Modo automático: probar varios métodos
                    const methods = ['mempool', 'blockstream', 'proxy1'];
                    
                    for (const method of methods) {
                        try {
                            statusDiv.innerHTML = `<span class="loading"></span> Probando ${method}...`;
                            result = await dataFetchers[method]();
                            proxyStatus.textContent = `✅ Conectado mediante: ${result.method}`;
                            proxyStatus.className = 'proxy-status success';
                            break;
                        } catch (error) {
                            console.warn(`Método ${method} falló:`, error.message);
                            errors.push(`${method}: ${error.message}`);
                        }
                    }
                } else {
                    // Usar método específico
                    try {
                        result = await dataFetchers[selectedMethod]();
                        proxyStatus.textContent = `✅ Conectado mediante: ${result.method}`;
                        proxyStatus.className = 'proxy-status success';
                    } catch (error) {
                        errors.push(`${selectedMethod}: ${error.message}`);
                    }
                }
                
                if (!result) {
                    throw new Error('Todos los métodos fallaron. Errores: ' + errors.join('; '));
                }

                // Procesar timestamps
                const timestamps = result.blocks.map(block => block.time).filter(t => t && !isNaN(t));
                
                if (timestamps.length < 11) {
                    throw new Error(`Solo se obtuvieron ${timestamps.length} bloques válidos`);
                }

                // Calcular MTP (mediana)
                const sortedTimestamps = [...timestamps].sort((a, b) => a - b);
                const medianTimestamp = sortedTimestamps[Math.floor(sortedTimestamps.length / 2)];
                const compensatedMTP = medianTimestamp + 3300;
                const mtpDate = new Date(compensatedMTP * 1000);
                
                mtpDiv.textContent = `MTP + 3300s (GMT-3): ${mtpDate.toLocaleString('es-AR', {
                    timeZone: 'America/Argentina/Buenos_Aires',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                })}`;

                // Calcular media aritmética
                const meanTimestamp = Math.round(timestamps.reduce((sum, time) => sum + time, 0) / timestamps.length);
                const compensatedMean = meanTimestamp + 3300;
                const meanDate = new Date(compensatedMean * 1000);
                
                meanDiv.textContent = `Media + 3300s (GMT-3): ${meanDate.toLocaleString('es-AR', {
                    timeZone: 'America/Argentina/Buenos_Aires',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                })}`;

                statusDiv.textContent = `✓ Datos actualizados (${timestamps.length} bloques)`;
                statusDiv.className = 'success';
                
            } catch (error) {
                console.error('Error completo:', error);
                statusDiv.textContent = `❌ Error: ${error.message}`;
                statusDiv.className = 'error';
                mtpDiv.textContent = 'No disponible - Error de conexión';
                meanDiv.textContent = 'No disponible - Error de conexión';
                proxyStatus.textContent = '⚠️ Problemas de conexión. Intenta cambiar el método.';
                proxyStatus.className = 'proxy-status warning';
            } finally {
                updateBtn.disabled = false;
                isUpdating = false;
            }
        }

        function toggleAutoUpdate() {
            const autoStatus = document.getElementById('autoStatus');
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
                autoUpdateInterval = null;
                autoStatus.textContent = 'OFF';
            } else {
                autoUpdateInterval = setInterval(getBlockchainTimes, 60000);
                autoStatus.textContent = 'ON';
                getBlockchainTimes(); // Actualizar inmediatamente
            }
        }

        // Ejecutar al cargar
        window.addEventListener('load', () => {
            getBlockchainTimes();
        });
    </script>
</body>
</html>
