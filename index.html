<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcoin Clock — Cartel LED</title>

  <style>
    :root {
      --columnas: 88;
      --filas: 7;
      --led-size: 7px;
      --led-gap: 2px;
      --led-on: #f0b90b;
      --led-off: #1a1200;
      --panel-width:  calc((var(--led-size) * var(--columnas)) + (var(--led-gap) * (var(--columnas) - 1)));
      --panel-height: calc((var(--led-size) * var(--filas))   + (var(--led-gap) * (var(--filas)   - 1)));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 1.8em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
      text-align: center;
    }

    /* ── PANEL LED ──────────────────────────────────── */
    #theMarquee {
      padding: 14px 16px;
      background: linear-gradient(0deg, #111, #1e1e1e);
      border-radius: 10px;
      box-shadow:
        0px  0px 2px 0px #777 inset,
        0px -1px 2px 0px #777 inset,
        2px -5px 5px 0px #111 inset,
        0px -5px 5px 0px #111 inset,
        0px  5px 18px 0px #050505;
      overflow: hidden;
    }

    #matrix {
      width:  var(--panel-width);
      height: var(--panel-height);
      display: grid;
      grid-template-columns: repeat(var(--columnas), var(--led-size));
      grid-template-rows:    repeat(var(--filas),    var(--led-size));
      gap: var(--led-gap);
    }

    .light {
      width:  var(--led-size);
      height: var(--led-size);
      border-radius: 50%;
    }
    .off {
      background-color: var(--led-off);
      box-shadow: inset 0 0 2px #000;
    }
    .on {
      background-color: var(--led-on);
      box-shadow: 0 0 4px var(--led-on), 0 0 8px var(--led-on);
    }

    /* ── ETIQUETA DE CANAL ──────────────────────────── */
    #channelLabel {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.55);
      text-align: center;
      text-transform: uppercase;
      height: 16px;
    }

    /* ── CONTROLES ──────────────────────────────────── */
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: rgba(255,255,255,0.18);
      color: white;
      cursor: pointer;
      font-size: 0.9em;
      transition: background 0.2s;
    }
    button:hover  { background: rgba(255,255,255,0.30); }
    button:active { background: rgba(255,255,255,0.40); }

    .color-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--led-on);
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── STATUS ─────────────────────────────────────── */
    #statusBar {
      margin-top: 14px;
      font-size: 0.78em;
      color: rgba(255,255,255,0.50);
      text-align: center;
    }
  </style>
</head>

<body>
  <h1>⛓️ Hora según Blockchain de Bitcoin</h1>

  <div id="theMarquee">
    <div id="matrix"></div>
  </div>
  <div id="channelLabel">Inicializando…</div>

  <div class="controls">
    <button id="slowBtn">◀ Más lento</button>
    <button id="fastBtn">Más rápido ▶</button>
    <button id="pauseBtn">⏸ Pausar</button>
    <button id="colorBtn"><span class="color-dot" id="colorDot"></span>Color</button>
    <button id="refreshBtn">🔄 Actualizar datos</button>
  </div>

  <div id="statusBar">Obteniendo datos de la blockchain…</div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    //  CONSTANTES DE LA MATRIZ
    // ═══════════════════════════════════════════════════════════════
    const COLS   = 88;
    const ROWS   = 7;
    const MARGIN = 3;   // columnas vacías entre final del mensaje y borde derecho al entrar

    // ═══════════════════════════════════════════════════════════════
    //  ESTADO DEL ANIMADOR
    // ═══════════════════════════════════════════════════════════════
    // Fases: 'scroll-in' → 'pause' → 'scroll-out' → (siguiente canal)
    let channels    = [];   // array de { label, text } que se irán cargando
    let pendingChannels = null; // nuevos canales pendientes para aplicar al terminar el ciclo completo
    let chanIdx     = 0;
    let phase       = 'idle'; // idle | scroll-in | pause | blink | scroll-out
    let colOffset   = 0;      // columna de inicio del mensaje en la pantalla
    let staticColumns = [];    // parte fija del mensaje actual convertida a columnas LED
    let blinkColumns  = [];    // parte parpadeante del mensaje actual convertida a columnas LED
    let msgColumns    = [];    // mensaje actual completo convertido a columnas LED
    let blinkCount  = 0;
    let blinkState  = true;

    let fps         = 20;
    let paused      = false;
    let lastFrame   = 0;

    // ═══════════════════════════════════════════════════════════════
    //  DOM
    // ═══════════════════════════════════════════════════════════════
    const matrixEl    = document.getElementById('matrix');
    const channelLbl  = document.getElementById('channelLabel');
    const statusBar   = document.getElementById('statusBar');
    const slowBtn     = document.getElementById('slowBtn');
    const fastBtn     = document.getElementById('fastBtn');
    const pauseBtn    = document.getElementById('pauseBtn');
    const colorBtn    = document.getElementById('colorBtn');
    const colorDot    = document.getElementById('colorDot');
    const refreshBtn  = document.getElementById('refreshBtn');

    // ═══════════════════════════════════════════════════════════════
    //  PALETA DE COLORES
    // ═══════════════════════════════════════════════════════════════
    const COLORS = ['#f0b90b', '#00ffff', '#ff3030', '#00ff66', '#ffffff', '#ff66ff'];
    let colorIdx = 0;

    // ═══════════════════════════════════════════════════════════════
    //  INICIALIZACIÓN DE LA GRILLA DOM
    // ═══════════════════════════════════════════════════════════════
    function buildMatrix() {
      matrixEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const d = document.createElement('div');
          d.className = 'light off';
          matrixEl.appendChild(d);
        }
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  RENDERIZADO EFICIENTE (solo cambia lo necesario)
    // ═══════════════════════════════════════════════════════════════
    function renderFrame(msgCols, startCol, visible) {
      const children = matrixEl.children;
      // Construir buffer de la pantalla
      const screen = new Uint8Array(ROWS * COLS); // 0 = off, 1 = on

      if (visible) {
        for (let mc = 0; mc < msgCols.length; mc++) {
          const sc = startCol + mc;
          if (sc < 0 || sc >= COLS) continue;
          const col = msgCols[mc];
          for (let r = 0; r < ROWS; r++) {
            if (col[r]) screen[r * COLS + sc] = 1;
          }
        }
      }

      for (let i = 0; i < ROWS * COLS; i++) {
        const el  = children[i];
        const on  = screen[i] === 1;
        const was = el.classList.contains('on');
        if (on !== was) {
          if (on) { el.classList.remove('off'); el.classList.add('on'); }
          else    { el.classList.remove('on');  el.classList.add('off'); }
        }
      }
    }

    function renderSplitFrame(staticCols, blinkCols, startCol, blinkVisible) {
      const children = matrixEl.children;
      const screen = new Uint8Array(ROWS * COLS);

      // Parte fija: siempre visible
      for (let mc = 0; mc < staticCols.length; mc++) {
        const sc = startCol + mc;
        if (sc < 0 || sc >= COLS) continue;

        const col = staticCols[mc];
        for (let r = 0; r < ROWS; r++) {
          if (col[r]) screen[r * COLS + sc] = 1;
        }
      }

      // Parte parpadeante: solo visible si blinkVisible = true
      if (blinkVisible) {
        const blinkStart = startCol + staticCols.length;

        for (let mc = 0; mc < blinkCols.length; mc++) {
          const sc = blinkStart + mc;
          if (sc < 0 || sc >= COLS) continue;

          const col = blinkCols[mc];
          for (let r = 0; r < ROWS; r++) {
            if (col[r]) screen[r * COLS + sc] = 1;
          }
        }
      }

      for (let i = 0; i < ROWS * COLS; i++) {
        const el = children[i];
        const on = screen[i] === 1;
        const was = el.classList.contains('on');

        if (on !== was) {
          if (on) {
            el.classList.remove('off');
            el.classList.add('on');
          } else {
            el.classList.remove('on');
            el.classList.add('off');
          }
        }
      }
    }

    function clearScreen() {
      renderFrame([], 0, false);
    }

    // ═══════════════════════════════════════════════════════════════
    //  MÁQUINA DE ESTADOS DE ANIMACIÓN
    // ═══════════════════════════════════════════════════════════════
    /*
      FASES:
      idle       → espera hasta tener canales
      scroll-in  → el mensaje entra desde la derecha; termina cuando el último
                   caracter llega al centro o cuando cabe completo en pantalla
      pause      → mensaje estático 1.5 s
      blink      → parpadea 3 s a 0.5 Hz (3 ciclos completos = 6 cambios)
      scroll-out → el mensaje sale hacia la izquierda
      → pasa al siguiente canal
    */

    // Timers para fases basadas en tiempo
    let phaseTimer = 0; // timestamp de inicio de la fase actual

    // Cuántos pasos de blink quedan
    const BLINK_TOTAL   = 6;   // 3 s × 0.5 Hz × 2 estados = 6 cambios
    const BLINK_STEP_MS = 1000; // cada cambio dura 1000 ms (0.5 Hz = 1 ciclo/2s → medio ciclo = 1s)

    function loadChannel(idx) {
      chanIdx = idx % channels.length;
      const ch = channels[chanIdx];

      staticColumns = textToLED(ch.staticText || '');
      blinkColumns  = textToLED(ch.blinkText || '');
      msgColumns    = [...staticColumns, ...blinkColumns];

      colOffset = COLS + MARGIN;
      channelLbl.textContent = ch.label;
      phase = 'scroll-in';
    }

    function tickScroll() {
      // ── scroll-in ──────────────────────────────────────────────
      if (phase === 'scroll-in') {
        colOffset--;
        renderFrame(msgColumns, colOffset, true);

        // El mensaje llegó: su último carácter visible entró en pantalla
        // O bien el mensaje cabe completo y está centrado
        const msgEnd = colOffset + msgColumns.length;
        const msgFits = msgColumns.length <= COLS;

        if (msgFits) {
          // Centrar el mensaje
          const targetStart = Math.floor((COLS - msgColumns.length) / 2);
          if (colOffset <= targetStart) {
            colOffset = targetStart;
            renderFrame(msgColumns, colOffset, true);
            phaseTimer = performance.now();
            phase = 'pause';
          }
        } else {
          // Mensaje más largo que la pantalla: pausa cuando el inicio entra
          if (colOffset <= 0) {
            phaseTimer = performance.now();
            phase = 'pause';
          }
        }
      }

      // ── pause (1.5 s estático) ──────────────────────────────────
      else if (phase === 'pause') {
        renderFrame(msgColumns, colOffset, true);
        if (performance.now() - phaseTimer >= 1500) {
          blinkCount = 0;
          blinkState = true;
          phaseTimer = performance.now();
          phase = 'blink';
        }
      }

      // ── blink (3 s a 0.5 Hz) ───────────────────────────────────
      else if (phase === 'blink') {
        if (performance.now() - phaseTimer >= BLINK_STEP_MS) {
          blinkState = !blinkState;
          blinkCount++;
          phaseTimer = performance.now();
        }
        renderSplitFrame(staticColumns, blinkColumns, colOffset, blinkState);

        if (blinkCount >= BLINK_TOTAL) {
          renderSplitFrame(staticColumns, blinkColumns, colOffset, true); // queda encendido
          phase = 'scroll-out';
        }
      }

      // ── scroll-out ──────────────────────────────────────────────
      else if (phase === 'scroll-out') {
        colOffset--;
        renderFrame(msgColumns, colOffset, true);

        // Salió completamente por la izquierda
        if (colOffset + msgColumns.length <= 0) {
          clearScreen();

          if (channels.length > 0) {
            const nextIdx = chanIdx + 1;

            if (nextIdx >= channels.length) {
              if (pendingChannels) {
                channels = pendingChannels;
                pendingChannels = null;
              }

              loadChannel(0);
            } else {
              loadChannel(nextIdx);
            }
          } else {
            phase = 'idle';
          }
        }
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  LOOP PRINCIPAL
    // ═══════════════════════════════════════════════════════════════
    function loop(ts) {
      requestAnimationFrame(loop);

      if (paused) return;
      if (phase === 'idle') return;

      // Control de velocidad para scroll; blink usa su propio timer
      const interval = (phase === 'blink' || phase === 'pause') ? 0 : 1000 / fps;

      if (ts - lastFrame < interval) return;
      lastFrame = ts;

      tickScroll();
    }

    // ═══════════════════════════════════════════════════════════════
    //  FUENTE 5×7
    // ═══════════════════════════════════════════════════════════════
    const FONT = {
      "A":["01110","10001","10001","11111","10001","10001","10001"],
      "B":["11110","10001","10001","11110","10001","10001","11110"],
      "C":["01111","10000","10000","10000","10000","10000","01111"],
      "D":["11110","10001","10001","10001","10001","10001","11110"],
      "E":["11111","10000","10000","11110","10000","10000","11111"],
      "F":["11111","10000","10000","11110","10000","10000","10000"],
      "G":["01111","10000","10000","10011","10001","10001","01111"],
      "H":["10001","10001","10001","11111","10001","10001","10001"],
      "I":["11111","00100","00100","00100","00100","00100","11111"],
      "J":["00111","00010","00010","00010","10010","10010","01100"],
      "K":["10001","10010","10100","11000","10100","10010","10001"],
      "L":["10000","10000","10000","10000","10000","10000","11111"],
      "M":["10001","11011","10101","10101","10001","10001","10001"],
      "N":["10001","11001","10101","10011","10001","10001","10001"],
      "O":["01110","10001","10001","10001","10001","10001","01110"],
      "P":["11110","10001","10001","11110","10000","10000","10000"],
      "Q":["01110","10001","10001","10001","10101","10010","01101"],
      "R":["11110","10001","10001","11110","10100","10010","10001"],
      "S":["01111","10000","10000","01110","00001","00001","11110"],
      "T":["11111","00100","00100","00100","00100","00100","00100"],
      "U":["10001","10001","10001","10001","10001","10001","01110"],
      "V":["10001","10001","10001","10001","10001","01010","00100"],
      "W":["10001","10001","10001","10101","10101","10101","01010"],
      "X":["10001","10001","01010","00100","01010","10001","10001"],
      "Y":["10001","10001","01010","00100","00100","00100","00100"],
      "Z":["11111","00001","00010","00100","01000","10000","11111"],
      "0":["01110","10001","10011","10101","11001","10001","01110"],
      "1":["00100","01100","00100","00100","00100","00100","01110"],
      "2":["01110","10001","00001","00010","00100","01000","11111"],
      "3":["11110","00001","00001","01110","00001","00001","11110"],
      "4":["10010","10010","10010","11111","00010","00010","00010"],
      "5":["11111","10000","10000","11110","00001","00001","11110"],
      "6":["01111","10000","10000","11110","10001","10001","01110"],
      "7":["11111","00001","00010","00100","01000","01000","01000"],
      "8":["01110","10001","10001","01110","10001","10001","01110"],
      "9":["01110","10001","10001","01111","00001","00001","11110"],
      ".":["00000","00000","00000","00000","00000","01100","01100"],
      ",":["00000","00000","00000","00000","00000","01100","01000"],
      ":":["00000","01100","01100","00000","01100","01100","00000"],
      "-":["00000","00000","00000","11111","00000","00000","00000"],
      "/":["00001","00010","00010","00100","01000","01000","10000"],
      "!":["00100","00100","00100","00100","00100","00000","00100"],
      "?":["01110","10001","00001","00010","00100","00000","00100"],
      "(":["00010","00100","01000","01000","01000","00100","00010"],
      ")":["01000","00100","00010","00010","00010","00100","01000"],
      "+":["00000","00100","00100","11111","00100","00100","00000"],
      " ":["00000","00000","00000","00000","00000","00000","00000"]
    };

    function charToColumns(ch) {
      const pat = FONT[ch] || FONT[' '];
      const cols = [];
      for (let c = 0; c < pat[0].length; c++) {
        const col = [];
        for (let r = 0; r < pat.length; r++) col.push(pat[r][c] === '1');
        cols.push(col);
      }
      return cols;
    }

    function blankColumns(n = 3) {
      return Array.from({ length: n }, () => Array(ROWS).fill(false));
    }

    function textToLED(text) {
      const out = [];
      const up  = text.toUpperCase();

      for (let i = 0; i < up.length; i++) {
        out.push(...charToColumns(up[i]));

        if (i < up.length - 1) {
          out.push(...blankColumns(1));
        }
      }

      return out;
    }

    // ═══════════════════════════════════════════════════════════════
    //  CONTROLES UI
    // ═══════════════════════════════════════════════════════════════
    slowBtn.addEventListener('click',  () => { fps = Math.max(5, fps - 5); });
    fastBtn.addEventListener('click',  () => { fps = Math.min(60, fps + 5); });

    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? '▶ Continuar' : '⏸ Pausar';
    });

    colorBtn.addEventListener('click', () => {
      colorIdx = (colorIdx + 1) % COLORS.length;
      const c = COLORS[colorIdx];
      document.documentElement.style.setProperty('--led-on',  c);
      document.documentElement.style.setProperty('--led-off', adjustOff(c));
      colorDot.style.background = c;
    });

    refreshBtn.addEventListener('click', () => {
      statusBar.textContent = 'Actualizando datos…';
      getBlockchainTimes(false);
    });

    function adjustOff(hex) {
      // Versión muy oscura del color activo para el LED apagado
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgb(${Math.round(r*0.07)},${Math.round(g*0.07)},${Math.round(b*0.07)})`;
    }

    // ═══════════════════════════════════════════════════════════════
    //  CARGA DE CANALES Y ARRANQUE
    // ═══════════════════════════════════════════════════════════════
    function setChannels(data, options = {}) {
      const immediate = options.immediate === true;

      if (channels.length === 0 || immediate) {
        channels = data;
        pendingChannels = null;
        chanIdx = 0;

        if (channels.length > 0) {
          loadChannel(0);
        }

        return;
      }

      pendingChannels = data;
    }

    // ─── Datos de tiempo del sistema (siempre disponibles) ────────
    function getSystemChannel() {
      const d = new Date();

      const timeFmt = d.toLocaleTimeString('es-AR', {
        timeZone: 'America/Argentina/Buenos_Aires',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });

      return {
        label: 'SISTEMA  (GMT-3)',
        staticText: 'SYS ',
        blinkText: timeFmt
      };
    }

    // ─── Datos de blockchain ──────────────────────────────────────
    async function getBlockchainTimes(immediate = false) {
      statusBar.textContent = 'Cargando datos de blockchain…';

      let result = null;
      try {
        result = await BTC_FETCHERS.mempool();
      } catch(e) {
        console.error('Error al obtener datos:', e);
      }

      const sysCh = getSystemChannel();

      if (!result || result.blocks.length < 11) {
        statusBar.textContent = '⚠️ Sin datos de blockchain · usando reloj del sistema';
        setChannels([sysCh], { immediate });
        return;
      }

      // MTP
      const sorted  = [...result.blocks.map(b => b.time)].sort((a,b) => a-b);
      const mtp     = sorted[Math.floor(sorted.length/2)] + 3300;
      const mtpDate = new Date(mtp * 1000);
      const mtpTimeFmt = mtpDate.toLocaleTimeString('es-AR', {
        timeZone: 'America/Argentina/Buenos_Aires',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });

      // Media
      const mean     = Math.round(result.blocks.reduce((s,b) => s + b.time, 0) / result.blocks.length) + 3300;
      const meanDate = new Date(mean * 1000);
      const meanTimeFmt = meanDate.toLocaleTimeString('es-AR', {
        timeZone: 'America/Argentina/Buenos_Aires',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });

      statusBar.textContent = `✓ Datos actualizados · vía Mempool.space`;

      const newChannels = [
        sysCh,
        { label: 'MTP + 3300s (BTC)', staticText: 'MTP ', blinkText: mtpTimeFmt },
        { label: 'MEDIA + 3300s (BTC)', staticText: 'AVG ', blinkText: meanTimeFmt }
      ];

      setChannels(newChannels, { immediate });
    }

    // ═══════════════════════════════════════════════════════════════
    //  APIs BLOCKCHAIN - SOLO MEMPOOL.SPACE
    // ═══════════════════════════════════════════════════════════════
    const BTC_FETCHERS = {
      mempool: async () => {
        const r = await fetch('https://mempool.space/api/v1/blocks', {
          cache: 'no-store',
          headers: { 'Accept': 'application/json' }
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);

        const bd = await r.json();
        const blocks = bd.slice(0, 11).map(b => ({
          time: b.timestamp || b.mediantime || Math.floor(Date.now()/1000),
          height: b.height
        }));
        return { blocks, method: 'Mempool.space' };
      }
    };

    // ═══════════════════════════════════════════════════════════════
    //  ARRANQUE
    // ═══════════════════════════════════════════════════════════════
    buildMatrix();
    requestAnimationFrame(loop);
    getBlockchainTimes(true);

    // Auto-refresh cada 60 s
    setInterval(() => {
      // Solo actualiza los datos; no interrumpe la animación actual
      // Los nuevos channels se cargan al terminar el ciclo actual
      getBlockchainTimes(false);
    }, 60000);

  </script>
</body>
</html>
