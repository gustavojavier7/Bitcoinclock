<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora desde MTP y Media de Bitcoin (CORS Fijo)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            color: white;
            padding: 50px;
        }
        .time-display {
            font-size: 2em;
            margin: 20px;
            color: #f0b90b; /* Color Bitcoin */
        }
        #status {
            font-size: 1.2em;
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Hora según Blockchain de Bitcoin</h1>
    <div class="time-display" id="mtp-time">MTP + 3300s: Cargando...</div>
    <div class="time-display" id="system-time">Tiempo del sistema: Cargando...</div>
    <div class="time-display" id="mean-time">Media + 3300s: Cargando...</div>
    <div id="status">Obteniendo datos...</div>

    <script>
        async function getBlockchainTimes() {
            const mtpDiv = document.getElementById('mtp-time');
            const systemDiv = document.getElementById('system-time');
            const meanDiv = document.getElementById('mean-time');
            const statusDiv = document.getElementById('status');

            const fetchJson = async (url, options = {}) => {
                const response = await fetch(url, {
                    mode: 'cors',
                    cache: 'no-store',
                    ...options
                });
                if (!response.ok) {
                    throw new Error(`Solicitud fallida: ${response.status}`);
                }
                return response.json();
            };

            const fetchWithFallback = async (url) => {
                try {
                    // Intentar primero la petición directa con CORS habilitado.
                    return await fetchJson(url);
                } catch (directError) {
                    console.warn('Fallo la petición directa, probando proxy CORS.', directError);
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    return fetchJson(proxyUrl, { mode: 'cors' });
                }
            };

            try {
                const fetchWithCorsBypass = async (url) => {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) {
                        throw new Error(`Solicitud fallida: ${response.status}`);
                    }
                    return response.json();
                };

                // Actualizar tiempo del sistema
                const systemDate = new Date();
                systemDiv.textContent = `Tiempo del sistema (GMT-3): ${systemDate.toLocaleString('es-AR', {
                    timeZone: 'America/Argentina/Buenos_Aires',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                })}`;

                for (let i = latestHeight; i >= latestHeight - 10; i--) {
                }
                const blocks = await Promise.all(blockPromises);
                const timestamps = blocks.map((block) => block.time);

                // Paso 3: Calcular MTP (mediana) y compensar con 3300 segundos
                const sortedTimestamps = [...timestamps].sort((a, b) => a - b);
                const medianTimestamp = sortedTimestamps[Math.floor(sortedTimestamps.length / 2)];
                const compensatedMTP = medianTimestamp + 3300; // Compensar 55 minutos
                const mtpDate = new Date(compensatedMTP * 1000);
                mtpDate.setHours(mtpDate.getHours() - 3); // Ajustar a GMT-3

                // Paso 4: Calcular media aritmética y compensar con 3300 segundos
                const meanTimestamp = timestamps.reduce((sum, time) => sum + time, 0) / timestamps.length;
                const compensatedMean = meanTimestamp + 3300; // Compensar 55 minutos
                const meanDate = new Date(compensatedMean * 1000);
                meanDate.setHours(meanDate.getHours() - 3); // Ajustar a GMT-3
                meanDiv.textContent = `Media + 3300s (GMT-3): ${meanDate.toLocaleString('es-AR', {
                    timeZone: 'America/Argentina/Buenos_Aires',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                })}`;

                // Mostrar estado
                const mtpOriginal = new Date(medianTimestamp * 1000).toLocaleString('es-AR');

                statusDiv.textContent = `Último bloque: ${latestHeight}, MTP original: ${mtpOriginal}, Media original: ${meanOriginal}`;
            } catch (error) {
                statusDiv.textContent = `Error: ${error.message}. Intenta de nuevo.`;
                mtpDiv.textContent = 'No disponible';
                meanDiv.textContent = 'No disponible';

        // Ejecutar al cargar la página
        getBlockchainTimes();

</body>
</html>
